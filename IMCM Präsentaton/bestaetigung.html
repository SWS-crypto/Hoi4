<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nachricht gesendet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      text-align: center;
    }

    .box {
      background: #ffffff;
      color: #000;
      padding: 40px;
      border-radius: 12px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
      font-weight: bold;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn-home {
      background: #1a1a1a;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-home:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Nachricht erfolgreich gesendet!</h1>
  <p>Vielen Dank für deine Anfrage.  
     Deine Nachricht wurde erfolgreich übermittelt.</p>

  <a href="index.html" class="btn-home">Zur Startseite</a>
</div>

</body>
</html>
